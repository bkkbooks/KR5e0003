body:
  text: 太平經復文序入十一皇天金闕後聖太平帝君太極宫之高帝也地皇之裔生而靈異早悟大道勳業著於丹臺位號編於太極上清錫命總統羣真封掌兆民山川河海八極九垓莫不盡關於帝君而受事焉君有太師上相上宰上傅公卿侯伯皆上真寮屬垂謨作典預令下教故作太平復文先傳上相青童君傳上宰西城王君王君傳弟子帛和帛和傳弟子干吉干君初得惡疾殆將不救詣帛和求醫帛君告曰吾傳汝太平本文可因易為一百七十卷編成三百六十章普傳於天下授有德之君致太平不但疾愈兼而度世干吉授教究極精義敷演成教當東漢末中國喪亂齎經南遊吳越居越東一百三十里山名太平溪曰干溪遺迹見存士庶翕然歸心時孫策初定江南方正霸業策左右咸奉干吉策以為搖動人心因誣以罪而縶之策告曰天久旱得雨當免條忽之間隂雲四合風雨暴至策愈惡之令斬首懸諸市門一旦暴風至而失尸所在君因更名字遂入蜀去策覽鏡見君首在鏡中因發面瘡而卒時咸以戮辱神仙致斯早殞故孫權立益信奉道術師葛仙公介先生亦遊其庭南朝喪亂太平不復行暨梁陶先生弟子桓法闓闓東陽烏傷縣人於溪谷間得太平本文因取歸而疾作先生曰太平教未當行汝強取之故疾也令却送本處未幾疾愈至陳宣帝時海隅山漁人得素書有光燭天宣帝敕道士周智響往祝請因得此文丹書焕然周智響善於太平經義常自講習時號太平法師宣帝略知經旨而不能行陳氏五主宣帝最賢爰自南朝湮沒中國復興法教雖存罕有行者綿歷年代斯文不泯繕寫寶持將俟賢哲壬辰之運迎聖君下降覩太平至理仙侯蒞事天民受賜復純古斯文之功彰也凡四部九十五章二千一百二十八字皆太平本文其三百六十二章是干君從本文中演出並行於世以復相輔成教而傳受焉故不謬也
